<h2>Register</h2>

<mat-card>
  <mat-card-header>Register</mat-card-header>
  <mat-card-content>
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <mat-form-field>
        <label for="email">Email</label>
        <input matInput id="email" type="email" />
      </mat-form-field>

      <mat-form-field>
        <label for="password">Password</label>
        <input matInput id="password" type="password" />
      </mat-form-field>

      <mat-form-field>
        <label for="confirm-password">Confirm Password</label>
        <input matInput id="confirm-password" type="password" />
      </mat-form-field>

      <input type="submit" value="Register" />
    </form>
  </mat-card-content>
</mat-card>
