<mat-card>
    <mat-card-header>Log in</mat-card-header>
    <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <mat-form-field>
                <label for="email">Email</label>
                <input matInput id="email" type="email" />
            </mat-form-field>

            <mat-form-field>
                <label for="password">Password</label>
                <input matInput id="password" type="password" />
            </mat-form-field>

            <input type="submit" value="Log in">
        </form>
    </mat-card-content>
</mat-card>
