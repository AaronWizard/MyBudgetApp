<mat-card>
  <mat-card-header><h2>Log in</h2></mat-card-header>
  <mat-card-content>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <mat-form-field>
        <mat-label for="email">Email</mat-label>
        <input matInput id="email" type="email" />
      </mat-form-field>

      <mat-form-field>
        <mat-label for="password">Password</mat-label>
        <input matInput id="password" type="password" />
      </mat-form-field>

      <button matButton="elevated">Log in</button>
    </form>

    <div id="register-link">Need an account? <a matButton routerLink="/register">Register</a></div>
  </mat-card-content>
</mat-card>
