version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    depends_on:
      - db
      - mailpit

  db:
    image: postgres:18.3
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  # Open Mailpit at http://localhost:8025
  mailpit:
    image: axllent/mailpit:v1.29.6
    restart: unless-stopped
    ports:
      - 8025:8025 # Web UI
      - 1025:1025 # SMTP
    environment:
      MP_SMTP_AUTH: "mailpit:mailpit"
      MP_SMTP_AUTH_ALLOW_INSECURE: true

volumes:
  postgres-data:
